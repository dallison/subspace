name: CI

on: [push, pull_request]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  test:
    name: test (${{ matrix.os }}, ${{ matrix.mode }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60 # liberal upper bound to protect against tests stalling
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            mode: fastbuild
            bazel_flags:
          - os: ubuntu-latest
            mode: opt
            bazel_flags: -c opt
          - os: ubuntu-24.04-arm
            mode: fastbuild
            bazel_flags:
          - os: ubuntu-24.04-arm
            mode: opt
            bazel_flags: -c opt
          - os: macos-latest
            mode: fastbuild
            bazel_flags: --config=macos_arm64
          - os: macos-latest
            mode: opt
            bazel_flags: --config=macos_arm64 -c opt

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          # Avoid downloading Bazel every time.
          bazelisk-cache: true
          # Store build cache per workflow.
          disk-cache: ${{ github.workflow }}-${{ matrix.os }}-${{ matrix.mode }}
          # Share repository cache between workflows.
          repository-cache: true

      - name: Build all targets
        run: |
          bazel build //... \
            --verbose_failures \
            ${{ matrix.bazel_flags }}

      - name: Run tests
        run: |
          bazel test \
            //... \
            --verbose_failures \
            --test_output=errors \
            ${{ matrix.bazel_flags }}

      - name: Run split-buffer client tests
        run: |
          bazel test \
            //client:client_test \
            --verbose_failures \
            --test_output=errors \
            --test_arg=--use_split_buffers \
            ${{ matrix.bazel_flags }}

      - name: Upload Bazel test logs
        uses: actions/upload-artifact@v7
        if: failure() # Upload artifacts only if a step failed
        with:
          name: bazel-test-logs-${{ matrix.os }}-${{ matrix.mode }}
          path: bazel-testlogs

  diagnostics:
    name: diagnostics (${{ matrix.os }}, ${{ matrix.mode }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            mode: asan
            experimental: false
            bazel_flags: --config=asan
            run_under:
          - os: macos-latest
            mode: asan
            experimental: false
            bazel_flags: --config=macos_arm64 --config=asan
            run_under:
          - os: ubuntu-latest
            mode: tsan
            experimental: true
            bazel_flags: --config=tsan
            run_under:
          - os: macos-latest
            mode: tsan
            experimental: true
            bazel_flags: --config=macos_arm64 --config=tsan
            run_under:
          - os: ubuntu-latest
            mode: valgrind
            experimental: false
            bazel_flags:
            run_under: --run_under='valgrind --error-exitcode=1 --errors-for-leak-kinds=definite'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os }}-${{ matrix.mode }}
          repository-cache: true

      - name: Install Valgrind
        if: matrix.mode == 'valgrind'
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind

      - name: Run ${{ matrix.mode }} client test
        run: |
          set +e
          bazel test \
            //client:client_test \
            --verbose_failures \
            --test_output=errors \
            --test_arg=--use_split_buffers \
            ${{ matrix.bazel_flags }} \
            ${{ matrix.run_under }}
          status=$?
          if [ "$status" -ne 0 ] && [ "${{ matrix.experimental }}" = "true" ]; then
            echo "::warning::Experimental ${{ matrix.mode }} diagnostics failed with exit code $status"
            exit 0
          fi
          exit "$status"

      - name: Upload diagnostic Bazel test logs
        uses: actions/upload-artifact@v7
        if: ${{ failure() || matrix.experimental }}
        with:
          name: bazel-diagnostic-test-logs-${{ matrix.os }}-${{ matrix.mode }}
          path: bazel-testlogs

  latency:
    name: latency (${{ matrix.platform }}, opt)
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux
            bazel_flags: -c opt
          - os: macos-latest
            platform: macos
            bazel_flags: --config=macos_arm64 -c opt

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os }}-latency-opt
          repository-cache: true

      - name: Run optimized latency tests
        run: |
          bazel test \
            //client:latency_test \
            --test_filter=LatencyTest.PublisherLatencyHistogram:LatencyTest.SubscriberLatency:LatencyTest.PubSubLatency \
            --verbose_failures \
            --test_output=all \
            --test_env=SUBSPACE_LATENCY_OS=${{ matrix.platform }} \
            --test_env=SUBSPACE_LATENCY_MODE=opt \
            ${{ matrix.bazel_flags }}
          mkdir -p latency-records
          cp bazel-testlogs/client/latency_test/test.log latency-records/latency-${{ matrix.platform }}.log

      - name: Upload latency records
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: latency-records-${{ matrix.platform }}
          path: latency-records

  latency-report:
    name: latency report
    runs-on: ubuntu-latest
    needs: latency
    if: always() && !cancelled() && needs.latency.result == 'success'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download latency records
        uses: actions/download-artifact@v7
        with:
          pattern: latency-records-*
          path: latency-records
          merge-multiple: true

      - name: Render latency report
        run: |
          python3 tools/render_latency_report.py \
            --output-dir latency-report \
            --run-url "${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            latency-records
          cat latency-report/summary.md >> "${GITHUB_STEP_SUMMARY}"

      - name: Upload latency report
        uses: actions/upload-artifact@v7
        with:
          name: latency-report
          path: latency-report

      - name: Comment on PR
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPOSITORY: ${{ github.repository }}
        run: |
          marker='<!-- subspace-latency-report -->'
          comment_id="$(gh api "repos/${REPOSITORY}/issues/${PR_NUMBER}/comments" --jq "map(select(.user.type == \"Bot\" and (.body | contains(\"${marker}\"))))[0].id // \"\"")"
          if [ -n "${comment_id}" ]; then
            gh api -X PATCH "repos/${REPOSITORY}/issues/comments/${comment_id}" -f body="$(cat latency-report/comment.md)"
          else
            gh pr comment "${PR_NUMBER}" --body-file latency-report/comment.md
          fi

  cmake:
    name: cmake (${{ matrix.build_type }})
    runs-on: ubuntu-latest
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        build_type: [Debug, Release]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Configure CMake
        run: cmake -S . -B build/cmake-${{ matrix.build_type }} -DCMAKE_BUILD_TYPE=${{ matrix.build_type }}

      - name: Build CMake targets
        run: cmake --build build/cmake-${{ matrix.build_type }} --parallel $(nproc)

      - name: Run CMake tests
        run: ctest --test-dir build/cmake-${{ matrix.build_type }} --output-on-failure
