name: CI

on: [push, pull_request]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60 # liberal upper bound to protect against tests stalling
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
          - os: ubuntu-24.04-arm
          - os: macos-latest
            bazel_flags: --config=macos_arm64

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          # Avoid downloading Bazel every time.
          bazelisk-cache: true
          # Store build cache per workflow.
          disk-cache: ${{ github.workflow }}-${{ matrix.os }}
          # Share repository cache between workflows.
          repository-cache: true

      - name: Build all targets
        run: |
          bazel build //... \
            --verbose_failures \
            ${{ matrix.bazel_flags }}

      - name: Run tests
        run: |
          bazel test \
            //... \
            --verbose_failures \
            --test_output=errors \
            ${{ matrix.bazel_flags }}

      - name: Run split-buffer client tests
        run: |
          bazel test \
            //client:client_test \
            --verbose_failures \
            --test_output=errors \
            --test_arg=--use_split_buffers \
            ${{ matrix.bazel_flags }}

      - name: Upload Bazel test logs
        uses: actions/upload-artifact@v7
        if: failure() # Upload artifacts only if a step failed
        with:
          name: bazel-test-logs-${{ matrix.os }}
          path: bazel-testlogs

  diagnostics:
    name: diagnostics (${{ matrix.os }}, ${{ matrix.mode }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 60
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            mode: asan
            experimental: false
            bazel_flags: --config=asan
            run_under:
          - os: macos-latest
            mode: asan
            experimental: false
            bazel_flags: --config=macos_arm64 --config=asan
            run_under:
          - os: ubuntu-latest
            mode: tsan
            experimental: true
            bazel_flags: --config=tsan
            run_under:
          - os: macos-latest
            mode: tsan
            experimental: true
            bazel_flags: --config=macos_arm64 --config=tsan
            run_under:
          - os: ubuntu-latest
            mode: valgrind
            experimental: false
            bazel_flags:
            run_under: --run_under='valgrind --error-exitcode=1 --errors-for-leak-kinds=definite'

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Bazel
        uses: bazel-contrib/setup-bazel@0.18.0
        with:
          bazelisk-cache: true
          disk-cache: ${{ github.workflow }}-${{ matrix.os }}-${{ matrix.mode }}
          repository-cache: true

      - name: Install Valgrind
        if: matrix.mode == 'valgrind'
        run: |
          sudo apt-get update
          sudo apt-get install -y valgrind

      - name: Run ${{ matrix.mode }} client test
        run: |
          set +e
          bazel test \
            //client:client_test \
            --verbose_failures \
            --test_output=errors \
            --test_arg=--use_split_buffers \
            ${{ matrix.bazel_flags }} \
            ${{ matrix.run_under }}
          status=$?
          if [ "$status" -ne 0 ] && [ "${{ matrix.experimental }}" = "true" ]; then
            echo "::warning::Experimental ${{ matrix.mode }} diagnostics failed with exit code $status"
            exit 0
          fi
          exit "$status"

      - name: Upload diagnostic Bazel test logs
        uses: actions/upload-artifact@v7
        if: ${{ failure() || matrix.experimental }}
        with:
          name: bazel-diagnostic-test-logs-${{ matrix.os }}-${{ matrix.mode }}
          path: bazel-testlogs

  cmake:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install CMake build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y protobuf-compiler

      - name: Configure CMake
        run: cmake -S . -B build/cmake -DCMAKE_BUILD_TYPE=Debug

      - name: Build CMake targets
        run: cmake --build build/cmake --parallel $(nproc)

      - name: Run CMake tests
        run: ctest --test-dir build/cmake --output-on-failure
